<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF6B35">
<title>數學錯題相似題產生器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF8F0; --card: #FFFFFF; --primary: #FF6B35; --primary-light: #FFF0EB;
  --primary-dark: #D94F1E; --accent: #4ECDC4; --accent-light: #E8FAFA;
  --text: #2D2D2D; --text-muted: #888; --border: #F0E6DC;
  --radius: 16px; --radius-sm: 10px; --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); font-size: 16px; }

/* ===== 分數樣式 ===== */
.frac {
  display: inline-flex; flex-direction: column; align-items: center;
  vertical-align: middle; font-size: 0.85em; line-height: 1.2;
  margin: 0 2px; position: relative; top: -1px;
}
.frac-num { border-bottom: 1.5px solid currentColor; padding: 0 3px; text-align: center; min-width: 16px; }
.frac-den { padding: 0 3px; text-align: center; min-width: 16px; }
.mixed-num {
  display: inline-flex; align-items: center; gap: 1px;
  vertical-align: middle;
}
.mixed-int { font-size: 1em; }

header {
  background: var(--card); border-bottom: 2px solid var(--border);
  padding: 14px 18px; display: flex; align-items: center; gap: 12px;
  position: sticky; top: 0; z-index: 30;
}
.logo-icon { width: 40px; height: 40px; background: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
header h1 { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; color: var(--primary); line-height: 1.2; }
header p { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.header-right { margin-left: auto; display: flex; gap: 8px; }
.history-btn, .setup-btn { background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: 7px 10px; font-size: 18px; cursor: pointer; transition: all .18s; }
.history-btn:hover, .setup-btn:hover { border-color: var(--primary); background: var(--primary-light); }

.main { max-width: 680px; margin: 0 auto; padding: 16px 14px calc(80px + var(--safe-bottom)); display: flex; flex-direction: column; gap: 14px; }

.card { background: var(--card); border-radius: var(--radius); border: 1.5px solid var(--border); overflow: hidden; }
.card-header { padding: 13px 18px 11px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.card-header .step { width: 26px; height: 26px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.card-header h2 { font-size: 15px; font-weight: 700; }
.card-body { padding: 16px; }

.grade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.grade-btn { border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: white; padding: 14px 4px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all .15s; text-align: center; min-height: 52px; }
.grade-btn:active { transform: scale(.96); }
.grade-btn.active { border-color: var(--primary); background: var(--primary); color: white; font-weight: 700; }

.qtype-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.qtype-btn { border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: white; padding: 13px 12px; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: all .15s; text-align: left; display: flex; align-items: center; gap: 10px; min-height: 64px; }
.qtype-btn:active { transform: scale(.97); }
.qt-icon { font-size: 22px; flex-shrink: 0; }
.qt-info { display: flex; flex-direction: column; }
.qt-name { font-size: 14px; font-weight: 700; color: var(--text); }
.qt-desc { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.qtype-btn.active { border-color: #7C5CBF; background: #7C5CBF; }
.qtype-btn.active .qt-name { color: white; }
.qtype-btn.active .qt-desc { color: rgba(255,255,255,.7); }

.figure-notice { display: none; background: #FEF9E7; border: 1.5px solid #F9CA24; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: #856404; line-height: 1.7; margin-top: 10px; }
.figure-notice.show { display: block; }

.media-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.media-btn { border: 2px solid var(--border); border-radius: var(--radius); background: white; padding: 20px 10px; text-align: center; cursor: pointer; transition: all .18s; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
.media-btn input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.media-btn:active { transform: scale(.97); }
.media-btn .mb-icon { font-size: 32px; }
.media-btn .mb-label { font-size: 14px; font-weight: 700; color: var(--text); }
.media-btn .mb-sub { font-size: 11px; color: var(--text-muted); }

.preview-wrap { display: none; margin-bottom: 12px; position: relative; }
.preview-wrap.show { display: block; }
.preview-img { width: 100%; max-height: 280px; object-fit: contain; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: #F8F8F8; }
.remove-img { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.6); color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

.divider { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 13px; margin: 12px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

textarea { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 13px 14px; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; color: var(--text); resize: none; outline: none; min-height: 90px; line-height: 1.7; transition: border-color .2s; background: white; }
textarea:focus { border-color: var(--primary); }

.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 25; background: white; border-top: 1.5px solid var(--border); padding: 12px 16px calc(12px + var(--safe-bottom)); }
.generate-btn { width: 100%; background: var(--primary); color: white; border: none; border-radius: var(--radius); padding: 17px; font-size: 17px; font-family: 'Nunito', sans-serif; font-weight: 900; cursor: pointer; transition: all .18s; letter-spacing: 0.5px; }
.generate-btn:active { transform: scale(.98); background: var(--primary-dark); }
.generate-btn:disabled { opacity: .5; cursor: not-allowed; }

.error-box { display: none; background: #FFF0F0; border: 1.5px solid #FFB5B5; border-radius: var(--radius-sm); padding: 14px 16px; color: #C0392B; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.error-box.show { display: block; }

.loading { display: none; text-align: center; padding: 36px 20px; }
.loading.show { display: block; }
.dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 14px; }
.dots span { width: 13px; height: 13px; background: var(--primary); border-radius: 50%; animation: bounce 1.2s infinite; }
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:.5;}40%{transform:translateY(-13px);opacity:1;} }
.loading p { color: var(--text-muted); font-size: 14px; }

.result-section { display: none; }
.result-section.show { display: block; }
.result-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.result-title { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.result-title h2 { font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 900; color: var(--primary); }
.badge { background: var(--primary-light); color: var(--primary); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700; }
.qtype-badge { border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700; }
.export-btns { display: flex; gap: 8px; width: 100%; }
.export-btn { flex: 1; background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; cursor: pointer; transition: all .15s; text-align: center; color: var(--text); }
.export-btn:active { transform: scale(.97); }
.export-btn.print-btn { border-color: var(--accent); color: var(--accent); }

.original-summary { background: #F5F5F5; border-radius: var(--radius-sm); padding: 12px 16px; margin-bottom: 14px; font-size: 14px; color: var(--text-muted); line-height: 2; border-left: 4px solid var(--primary); }
.original-summary strong { color: var(--primary); display: block; margin-bottom: 3px; font-size: 12px; }
.figure-result-notice { display: none; background: #FEF9E7; border: 1.5px solid #F0C56E; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 13px; color: #7B5800; line-height: 1.8; margin-bottom: 14px; }
.figure-result-notice.show { display: block; }

.question-card { background: white; border: 1.5px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; }
.q-header { background: var(--primary-light); padding: 12px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #FFE0D0; }
.q-num { width: 30px; height: 30px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-family: 'Nunito', sans-serif; font-size: 15px; flex-shrink: 0; }
.q-label { font-size: 14px; color: var(--primary-dark); font-weight: 700; }
.q-type-tag { margin-left: auto; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.q-body { padding: 16px; }
.q-text { font-size: 16px; line-height: 2.4; color: var(--text); word-break: break-word; }
.q-figure-hint { margin-top: 10px; background: #FEF9E7; border-left: 3px solid #E67E22; padding: 9px 12px; border-radius: 0 8px 8px 0; font-size: 13px; color: #7B5800; line-height: 1.6; }
.q-answer { margin-top: 14px; background: var(--accent-light); border: 1.5px solid var(--accent); border-radius: var(--radius-sm); padding: 12px 14px; }
.q-answer-toggle { background: none; border: none; cursor: pointer; font-size: 14px; color: var(--accent); font-weight: 700; padding: 0; display: flex; align-items: center; gap: 8px; font-family: 'Noto Sans TC', sans-serif; width: 100%; min-height: 44px; }
.q-answer-content { display: none; margin-top: 10px; font-size: 14px; color: #0D7A74; line-height: 2.4; }
.q-answer-content.show { display: block; }
.answer-final { margin-top: 10px; font-weight: 700; font-size: 15px; }

.reset-btn { width: 100%; background: white; color: var(--primary); border: 2px solid var(--primary); border-radius: var(--radius); padding: 15px; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; cursor: pointer; transition: all .18s; margin-top: 6px; min-height: 52px; }
.reset-btn:active { transform: scale(.98); background: var(--primary-light); }

/* ===== MODALS ===== */
.modal-overlay, .history-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 50; align-items: flex-end; justify-content: center; }
.modal-overlay.show, .history-overlay.show { display: flex; }
.modal-box, .history-box { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px calc(24px + var(--safe-bottom)); width: 100%; max-width: 680px; max-height: 85vh; overflow-y: auto; animation: slideUp .25s ease; }
@keyframes slideUp { from{transform:translateY(100%);}to{transform:translateY(0);} }
.modal-handle { width: 40px; height: 4px; background: #DDD; border-radius: 4px; margin: 0 auto 20px; }
.modal-box h3, .history-box h3 { font-family: 'Nunito', sans-serif; font-size: 19px; font-weight: 900; color: var(--primary); margin-bottom: 16px; }
.setup-step { display: flex; gap: 12px; margin-bottom: 16px; }
.setup-step .ss-num { width: 28px; height: 28px; background: var(--primary); border-radius: 50%; color: white; font-weight: 700; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.setup-step .ss-text { font-size: 14px; line-height: 1.7; }
.setup-step a { color: var(--primary); font-weight: 700; text-decoration: none; }
.setup-step code { background: #F5F5F5; padding: 2px 7px; border-radius: 5px; font-size: 13px; font-family: monospace; }
.api-input-row { display: flex; gap: 8px; margin-top: 6px; }
.api-input-row input { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-family: monospace; outline: none; transition: border-color .2s; }
.api-input-row input:focus { border-color: var(--primary); }
.save-key-btn { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 12px 18px; font-size: 14px; font-weight: 700; font-family: 'Noto Sans TC', sans-serif; cursor: pointer; }
.key-status { font-size: 12px; margin-top: 6px; height: 16px; }
.key-status.ok { color: #27AE60; } .key-status.missing { color: #E74C3C; }
.modal-close { width: 100%; background: #F5F5F5; border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; font-weight: 700; color: var(--text-muted); cursor: pointer; margin-top: 16px; }
.history-empty { text-align: center; color: var(--text-muted); font-size: 14px; padding: 30px 0; }
.history-item { border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 13px 14px; margin-bottom: 10px; cursor: pointer; transition: all .15s; }
.history-item:active { background: var(--primary-light); border-color: var(--primary); }
.hi-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.hi-grade { background: var(--primary-light); color: var(--primary); border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
.hi-type { border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 700; }
.hi-time { font-size: 11px; color: var(--text-muted); margin-left: auto; }
.hi-summary { font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.history-clear { width: 100%; background: none; border: 1.5px solid #FFB5B5; border-radius: 10px; padding: 12px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; color: #C0392B; cursor: pointer; margin-top: 8px; }

.print-option-btn {
  width: 100%; background: white; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  padding: 16px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 14px; text-align: left;
  font-family: 'Noto Sans TC', sans-serif;
}
.print-option-btn:hover, .print-option-btn:active { border-color: var(--primary); background: var(--primary-light); }
.po-icon { font-size: 28px; flex-shrink: 0; }
.po-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.po-desc { font-size: 12px; color: var(--text-muted); }

.print-header { display: none; }

/* 列印媒體查詢：隱藏非列印區域 */
@media print {
  body > *:not(#printArea) { display: none !important; }
  #printArea { display: block !important; }
}
</style>
</head>
<body>

<header>
  <div class="logo-icon">🧮</div>
  <div>
    <h1>數學錯題相似題</h1>
    <p>國小課輔老師專用</p>
  </div>
  <div class="header-right">
    <button class="history-btn" onclick="openHistory()">📋</button>
    <button class="setup-btn" onclick="openSetup()">⚙️</button>
  </div>
</header>

<div class="main">
  <!-- 第一步：選擇年級 -->
  <div class="card">
    <div class="card-header"><div class="step">1</div><h2>選擇年級</h2></div>
    <div class="card-body">
      <div class="grade-grid">
        <button class="grade-btn" data-grade="一年級">一年級</button>
        <button class="grade-btn" data-grade="二年級">二年級</button>
        <button class="grade-btn" data-grade="三年級">三年級</button>
        <button class="grade-btn" data-grade="四年級">四年級</button>
        <button class="grade-btn" data-grade="五年級">五年級</button>
        <button class="grade-btn" data-grade="六年級">六年級</button>
      </div>
    </div>
  </div>

  <!-- 第二步：題型 -->
  <div class="card">
    <div class="card-header"><div class="step">2</div><h2>題型</h2></div>
    <div class="card-body">
      <div class="qtype-grid">
        <button class="qtype-btn active" data-type="auto"><span class="qt-icon">🤖</span><span class="qt-info"><span class="qt-name">AI 自動判斷</span><span class="qt-desc">自動識別題型</span></span></button>
        <button class="qtype-btn" data-type="計算題"><span class="qt-icon">🔢</span><span class="qt-info"><span class="qt-name">計算題</span><span class="qt-desc">加減乘除、分數</span></span></button>
        <button class="qtype-btn" data-type="應用題"><span class="qt-icon">📖</span><span class="qt-info"><span class="qt-name">應用題</span><span class="qt-desc">文字情境解題</span></span></button>
        <button class="qtype-btn" data-type="圖形題"><span class="qt-icon">📐</span><span class="qt-info"><span class="qt-name">圖形題</span><span class="qt-desc">幾何、面積、統計</span></span></button>
      </div>
      <div class="figure-notice" id="figureNotice">📌 <strong>圖形題說明：</strong>AI 會以文字描述圖形，並附上「教師備注」。</div>
    </div>
  </div>

  <!-- 第三步：上傳錯題 -->
  <div class="card">
    <div class="card-header"><div class="step">3</div><h2>上傳錯題</h2></div>
    <div class="card-body">
      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" class="preview-img" alt="題目預覽">
        <button class="remove-img" id="removeImg">✕</button>
      </div>
      <div class="media-btns" id="mediaBtns">
        <div class="media-btn">
          <input type="file" id="cameraInput" accept="image/*" capture="environment">
          <div class="mb-icon">📷</div><div class="mb-label">拍照</div><div class="mb-sub">直接開相機</div>
        </div>
        <div class="media-btn">
          <input type="file" id="galleryInput" accept="image/*">
          <div class="mb-icon">🖼️</div><div class="mb-label">從相簿選取</div><div class="mb-sub">選已有的圖片</div>
        </div>
      </div>
      <div class="divider">或 輸入題目文字</div>
      <textarea id="questionText" placeholder="例如：小明有 24 顆糖果，分給 6 個朋友，每人可以分到幾顆？" rows="4"></textarea>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="loading" id="loading"><div class="dots"><span></span><span></span><span></span></div><p>AI 正在出題中，請稍候⋯</p></div>

  <!-- 結果展示區域 -->
  <div class="result-section" id="resultSection">
    <div class="result-topbar">
      <div class="result-title">
        <h2>📝 相似題</h2>
        <span class="badge" id="gradeBadge"></span>
        <span class="qtype-badge" id="qtypeBadge"></span>
      </div>
      <div class="export-btns">
        <button class="export-btn print-btn" onclick="openPrintMenu()">🖨️ 列印／PDF</button>
        <button class="export-btn" id="copyBtn" onclick="copyAll()">📋 複製文字</button>
      </div>
    </div>
    <div class="figure-result-notice" id="figureResultNotice">⚠️ <strong>圖形題：</strong>請依「教師備注」補充圖形或作圖空間。</div>
    <div class="original-summary" id="originalSummary"></div>
    <div id="questionsContainer"></div>
    <button class="reset-btn" onclick="resetAll()">🔄 重新上傳題目</button>
  </div>
</div>

<div class="bottom-bar">
  <button class="generate-btn" id="generateBtn" onclick="generate()">✨ 產生 3 題相似題</button>
</div>

<!-- PRINT MENU MODAL -->
<div class="modal-overlay" id="printMenu" onclick="if(event.target===this)closePrintMenu()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h3>🖨️ 選擇列印內容</h3>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:4px;">
      <!-- 只有題目傳入 false -->
      <button class="print-option-btn" onclick="doPrint(false)">
        <div class="po-icon">📝</div>
        <div class="po-info">
          <div class="po-title">只有題目</div>
          <div class="po-desc">適合印給學生練習，不含解答</div>
        </div>
      </button>
      <!-- 題目+解答傳入 true -->
      <button class="print-option-btn" onclick="doPrint(true)">
        <div class="po-icon">📋</div>
        <div class="po-info">
          <div class="po-title">題目 + 解答</div>
          <div class="po-desc">含解題過程與答案，適合老師參考</div>
        </div>
      </button>
    </div>
    <button class="modal-close" onclick="closePrintMenu()">取消</button>
  </div>
</div>

<!-- API SETUP MODAL -->
<div class="modal-overlay" id="setupModal" onclick="if(event.target===this)closeSetup()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <h3>⚙️ API Key 設定</h3>
    <div class="setup-step"><div class="ss-num">1</div><div class="ss-text">前往 <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a> 免費申請帳號</div></div>
    <div class="setup-step"><div class="ss-num">2</div><div class="ss-text">登入後點「Create API Key」，複製以 <code>gsk_</code> 開頭的金鑰</div></div>
    <div class="setup-step"><div class="ss-num">3</div><div class="ss-text">貼到下方並儲存（只存在您的手機，不會上傳）</div></div>
    <div class="api-input-row">
      <input type="password" id="modalApiKey" placeholder="gsk_xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
      <button class="save-key-btn" onclick="saveKey()">儲存</button>
    </div>
    <div class="key-status" id="keyStatus"></div>
    <button class="modal-close" onclick="closeSetup()">關閉</button>
  </div>
</div>

<!-- HISTORY OVERLAY -->
<div class="history-overlay" id="historyPanel" onclick="if(event.target===this)closeHistory()">
  <div class="history-box">
    <div class="modal-handle"></div>
    <h3>📋 出題紀錄</h3>
    <div id="historyList"></div>
    <button class="history-clear" onclick="clearHistory()">🗑️ 清除所有紀錄</button>
    <button class="modal-close" onclick="closeHistory()">關閉</button>
  </div>
</div>

<script>
let selectedGrade = '';
let selectedType = 'auto';
let imageBase64 = '';
let imageType = '';
let lastResult = null;

// UI 交互
document.querySelectorAll('.grade-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedGrade = btn.dataset.grade;
  });
});
document.querySelectorAll('.qtype-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.qtype-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
    document.getElementById('figureNotice').classList.toggle('show', selectedType === '圖形題');
  });
});

// 檔案處理
document.getElementById('cameraInput').addEventListener('change', e => { if(e.target.files[0]) processFile(e.target.files[0]); });
document.getElementById('galleryInput').addEventListener('change', e => { if(e.target.files[0]) processFile(e.target.files[0]); });
function processFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const r = e.target.result;
    imageBase64 = r.split(',')[1]; imageType = file.type || 'image/jpeg';
    document.getElementById('previewImg').src = r;
    document.getElementById('previewWrap').classList.add('show');
    document.getElementById('mediaBtns').style.display = 'none';
  };
  reader.readAsDataURL(file);
}
document.getElementById('removeImg').addEventListener('click', () => {
  imageBase64 = ''; imageType = '';
  document.getElementById('previewImg').src = '';
  document.getElementById('previewWrap').classList.remove('show');
  document.getElementById('mediaBtns').style.display = '';
  document.getElementById('cameraInput').value = '';
  document.getElementById('galleryInput').value = '';
});

const typeColors = {
  '計算題':{ bg:'#EBF5FB', color:'#2980B9', border:'#AED6F1' },
  '應用題':{ bg:'#EAFAF1', color:'#27AE60', border:'#A9DFBF' },
  '圖形題':{ bg:'#FEF9E7', color:'#E67E22', border:'#F9CA24' },
  '一般題':{ bg:'#F5F5F5', color:'#888', border:'#DDD' },
};

// 分數渲染
function renderMath(text) {
  if (!text) return '';
  text = text.replace(/\{(\d+)\+(\d+)\/(\d+)\}/g, (_, w, n, d) =>
    `<span class="mixed-num"><span class="mixed-int">${w}</span><span class="frac"><span class="frac-num">${n}</span><span class="frac-den">${d}</span></span></span>`
  );
  text = text.replace(/\{(\d+)\/(\d+)\}/g, (_, n, d) =>
    `<span class="frac"><span class="frac-num">${n}</span><span class="frac-den">${d}</span></span>`
  );
  text = text.replace(/\n/g, '<br>');
  return text;
}

function buildSystemPrompt() {
  const typeHint = selectedType === 'auto' ? '請自動判斷題型。' : `這是一道【${selectedType}】。`;
  return `你是一位專業的國小數學老師。根據老師提供的錯題，出 3 道類似的練習題。
分數書寫規則：純分數 {分子/分母}，帶分數 {整數+分子/分母}。只回傳 JSON 格式。
{"originalSummary":"原題摘要","detectedType":"題型","questions":[{"question":"題目","solution":"步驟","answer":"答案","hasFigure":false,"figureHint":""}]}`;
}

async function generate() {
  const apiKey = localStorage.getItem('groq_api_key') || '';
  const questionText = document.getElementById('questionText').value.trim();
  document.getElementById('errorBox').classList.remove('show');
  if (!apiKey) { showError('請先設定 API Key。'); return; }
  if (!selectedGrade) { showError('請選擇年級。'); return; }
  if (!imageBase64 && !questionText) { showError('請提供題目內容。'); return; }

  document.getElementById('generateBtn').disabled = true;
  document.getElementById('loading').classList.add('show');
  document.getElementById('resultSection').classList.remove('show');

  try {
    const result = imageBase64 ? await callVision(apiKey) : await callText(apiKey, questionText);
    lastResult = result;
    saveHistory(result);
    renderResult(result);
  } catch(err) {
    showError('出題失敗：' + err.message);
  } finally {
    document.getElementById('generateBtn').disabled = false;
    document.getElementById('loading').classList.remove('show');
  }
}

async function callVision(apiKey) {
  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body: JSON.stringify({
      model:'meta-llama/llama-4-scout-17b-16e-instruct',
      messages:[
        {role:'system', content:buildSystemPrompt()},
        {role:'user', content:[
          {type:'image_url', image_url:{url:`data:${imageType};base64,${imageBase64}`}},
          {type:'text', text:`出 3 道相似題。`}
        ]}
      ],
      max_tokens:2500, temperature:0.7
    })
  });
  return parseResp(resp);
}

async function callText(apiKey, questionText) {
  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method:'POST', headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},
    body: JSON.stringify({
      model:'llama-3.3-70b-versatile',
      messages:[
        {role:'system', content:buildSystemPrompt()},
        {role:'user', content:`錯題：${questionText}`}
      ],
      max_tokens:2500, temperature:0.7
    })
  });
  return parseResp(resp);
}

async function parseResp(response) {
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  const data = await response.json();
  const content = data.choices?.[0]?.message?.content || '';
  const m = content.match(/\{[\s\S]*\}/);
  if (!m) throw new Error('AI 回傳格式有誤');
  return JSON.parse(m[0]);
}

function renderResult(data) {
  const detectedType = data.detectedType || (selectedType !== 'auto' ? selectedType : '一般題');
  const tc = typeColors[detectedType] || typeColors['一般題'];

  document.getElementById('gradeBadge').textContent = selectedGrade;
  const qb = document.getElementById('qtypeBadge');
  qb.textContent = detectedType;
  qb.style.cssText = `background:${tc.bg};color:${tc.color};border:1px solid ${tc.border};`;
  document.getElementById('figureResultNotice').classList.toggle('show', (data.questions||[]).some(q=>q.hasFigure));
  document.getElementById('originalSummary').innerHTML = `<strong>📌 原題分析</strong>${renderMath(escText(data.originalSummary||''))}`;

  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  (data.questions||[]).forEach((q,i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.innerHTML = `
      <div class="q-header"><div class="q-num">${i+1}</div><div class="q-label">第 ${i+1} 題</div></div>
      <div class="q-body">
        <div class="q-text">${renderMath(escText(q.question||''))}</div>
        ${q.hasFigure ? `<div class="q-figure-hint">✏️ 教師備注：${renderMath(escText(q.figureHint))}</div>` : ''}
        <div class="q-answer">
          <button class="q-answer-toggle" onclick="toggleAns(this)"><span>▶</span> 查看解答</button>
          <div class="q-answer-content">
            <div>${renderMath(escText(q.solution||''))}</div>
            <div class="answer-final">✅ 答案：${renderMath(escText(q.answer||''))}</div>
          </div>
        </div>
      </div>`;
    container.appendChild(card);
  });
  document.getElementById('resultSection').classList.add('show');
  setTimeout(() => document.getElementById('resultSection').scrollIntoView({behavior:'smooth',block:'start'}), 100);
}

function escText(s) {
  if (!s) return '';
  s = s.replace(/又(?=\{[\d+/]+\})/g, '');
  const fracs = [];
  s = s.replace(/\{[\d+/]+\}/g, m => { fracs.push(m); return `%%FRAC${fracs.length-1}%%`; });
  s = s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s = s.replace(/%%FRAC(\d+)%%/g, (_,i) => fracs[parseInt(i)]);
  return s;
}

function toggleAns(btn) {
  const c = btn.nextElementSibling;
  c.classList.toggle('show');
  btn.querySelector('span').textContent = c.classList.contains('show') ? '▼' : '▶';
}

// ===== 列印相關邏輯 =====
function openPrintMenu() { document.getElementById('printMenu').classList.add('show'); document.body.style.overflow='hidden'; }
function closePrintMenu() { document.getElementById('printMenu').classList.remove('show'); document.body.style.overflow=''; }

/**
 * 執行列印
 * @param {boolean} withAnswers 是否包含解答
 */
function doPrint(withAnswers) {
  closePrintMenu();
  if (!lastResult) return;

  const questions = lastResult.questions || [];
  const questionsHtml = questions.map((q, i) => {
    const qText = renderMath(escText(q.question || ''));
    // 如果 withAnswers 為 true，則生成解答區塊，否則為空字串
    const answerBlock = withAnswers ? `
      <div style="background:#F0FAFA;border-top:1px solid #B2EBE8;padding:14px 16px;font-size:14px;color:#0D7A74;line-height:2.2;">
        <div>${renderMath(escText(q.solution || '')).replace(/\n/g,'<br>')}</div>
        <div style="margin-top:10px;font-weight:700;font-size:15px;">✅ 答案：${renderMath(escText(q.answer || ''))}</div>
      </div>` : '';

    return `
      <div style="border:1px solid #DDD;border-radius:12px;margin-bottom:20px;overflow:hidden;page-break-inside:avoid;">
        <div style="background:#FFF0EB;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #FFE0D0;">
          <span style="width:26px;height:26px;background:#FF6B35;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:13px;">${i+1}</span>
          <span style="font-size:13px;color:#D94F1E;font-weight:700;">第 ${i+1} 題</span>
        </div>
        <div style="font-size:16px;line-height:2.4;padding:16px;word-break:break-word;">${qText}</div>
        ${answerBlock}
      </div>`;
  }).join('');

  // 建立/更新列印區域
  let area = document.getElementById('printArea');
  if (!area) {
    area = document.createElement('div');
    area.id = 'printArea';
    document.body.appendChild(area);
  }

  area.style.cssText = 'display:none; font-family:Noto Sans TC,sans-serif; max-width:800px; margin:0 auto; padding:30px; color:#2D2D2D;';
  area.innerHTML = `
    <div style="text-align:center;margin-bottom:24px;padding-bottom:14px;border-bottom:2px solid #FF6B35;">
      <div style="font-size:22px;font-weight:700;color:#FF6B35;margin-bottom:6px;">數學練習題</div>
      <div style="font-size:13px;color:#888;">${selectedGrade} ・ ${lastResult.detectedType || ''} ・ 共 3 題 ${withAnswers ? '(含解答)' : '(不含解答)'}</div>
    </div>
    <div style="background:#F5F5F5;border-left:4px solid #FF6B35;padding:10px 14px;margin-bottom:20px;font-size:13px;color:#666;line-height:1.8;border-radius:0 8px 8px 0;">
      <strong style="color:#FF6B35;display:block;font-size:11px;margin-bottom:2px;">📌 原題分析</strong>
      ${renderMath(escText(lastResult.originalSummary || ''))}
    </div>
    ${questionsHtml}`;

  // 延遲一下確保內容渲染後再開列印視窗
  setTimeout(() => {
    window.print();
  }, 50);
}

function copyAll() {
  if (!lastResult) return;
  let t = `${selectedGrade} 數學練習題\n\n`;
  (lastResult.questions||[]).forEach((q,i) => {
    t += `第 ${i+1} 題\n${q.question}\n\n答案：${q.answer}\n\n`;
  });
  navigator.clipboard.writeText(t).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已複製！';
    setTimeout(() => btn.textContent = '📋 複製文字', 2000);
  });
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg; box.classList.add('show');
}

function resetAll() {
  location.reload();
}

// 設定與歷史紀錄
function openSetup() {
  document.getElementById('modalApiKey').value = localStorage.getItem('groq_api_key')||'';
  updateKeyStatus();
  document.getElementById('setupModal').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeSetup() { document.getElementById('setupModal').classList.remove('show'); document.body.style.overflow=''; }
function saveKey() {
  const key = document.getElementById('modalApiKey').value.trim();
  if (key) { localStorage.setItem('groq_api_key', key); updateKeyStatus(); setTimeout(closeSetup, 500); }
}
function updateKeyStatus() {
  const key = localStorage.getItem('groq_api_key')||'';
  const el = document.getElementById('keyStatus');
  const ok = key && key.startsWith('gsk_');
  el.textContent = ok ? '✅ API Key 已設定' : '⚠️ 尚未設定 API Key';
  el.className = 'key-status ' + (ok ? 'ok' : 'missing');
}

function saveHistory(result) {
  const h = JSON.parse(localStorage.getItem('math_history')||'[]');
  h.unshift({ grade:selectedGrade, type:result.detectedType, summary:result.originalSummary, questions:result.questions, time:new Date().toLocaleString() });
  localStorage.setItem('math_history', JSON.stringify(h.slice(0,20)));
}
function openHistory() { renderHistoryList(); document.getElementById('historyPanel').classList.add('show'); }
function closeHistory() { document.getElementById('historyPanel').classList.remove('show'); }
function renderHistoryList() {
  const h = JSON.parse(localStorage.getItem('math_history')||'[]');
  const list = document.getElementById('historyList');
  if (!h.length) { list.innerHTML='<div class="history-empty">📭 沒有紀錄</div>'; return; }
  list.innerHTML = h.map((item,i) => `<div class="history-item" onclick="loadHistory(${i})"><div>${item.grade} - ${item.time}</div><div class="hi-summary">${item.summary}</div></div>`).join('');
}
function loadHistory(i) {
  const h = JSON.parse(localStorage.getItem('math_history')||'[]');
  selectedGrade = h[i].grade;
  lastResult = { detectedType:h[i].type, originalSummary:h[i].summary, questions:h[i].questions };
  closeHistory(); renderResult(lastResult);
}
function clearHistory() { if(confirm('確定清除？')) { localStorage.removeItem('math_history'); renderHistoryList(); } }

updateKeyStatus();
</script>
</body>
</html>
